<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>Coach de Hábitos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0e0c;
    --surface: #1a1814;
    --border: #2e2b24;
    --accent: #c8a96e;
    --accent-dim: #8a6f3e;
    --text: #e8e0d0;
    --text-muted: #7a7060;
    --user-bg: #1e2a1a;
    --user-border: #3a5230;
    --bot-bg: #1a1814;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    height: 100%;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .header {
    padding: 20px 28px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c8a96e 0%, #8a6f3e 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .header-info h1 {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.01em;
  }

  .header-info p {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #5a9e4a;
    margin-left: auto;
    box-shadow: 0 0 8px #5a9e4a88;
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message {
    display: flex;
    gap: 10px;
    max-width: 85%;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .message.bot { align-self: flex-start; }

  .msg-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    margin-top: 2px;
  }

  .message.bot .msg-avatar { background: linear-gradient(135deg, #c8a96e, #8a6f3e); }
  .message.user .msg-avatar { background: #2e3a28; border: 1px solid var(--user-border); font-size: 11px; color: #8ab87a; }

  .bubble {
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
    letter-spacing: 0.01em;
  }

  .message.bot .bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .message.user .bubble {
    background: var(--user-bg);
    border: 1px solid var(--user-border);
    border-top-right-radius: 4px;
    color: #c8e0c0;
  }

  .typing { display: flex; align-items: center; gap: 4px; padding: 14px 16px; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent-dim);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .input-area {
    padding: 16px 20px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-row { display: flex; gap: 10px; align-items: flex-end; }

  textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 300;
    resize: none;
    outline: none;
    line-height: 1.5;
    min-height: 46px;
    max-height: 120px;
    transition: border-color 0.2s;
  }

  textarea::placeholder { color: var(--text-muted); }
  textarea:focus { border-color: var(--accent-dim); }

  button {
    width: 46px; height: 46px;
    border-radius: 12px;
    background: var(--accent);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }

  button:hover { background: #d4b87e; }
  button:active { transform: scale(0.95); }
  button:disabled { background: var(--border); cursor: not-allowed; }
  button svg { width: 18px; height: 18px; }

  .hint { font-size: 11px; color: var(--text-muted); margin-top: 8px; text-align: center; letter-spacing: 0.03em; }

  @media (max-width: 600px) {
    html, body { height: 100dvh; }
    .header { padding: 14px 16px 12px; }
    .avatar { width: 36px; height: 36px; font-size: 15px; }
    .header-info h1 { font-size: 15px; }
    .header-info p { font-size: 10px; }
    .messages { padding: 16px 12px; gap: 12px; }
    .message { max-width: 92%; }
    .bubble { font-size: 13px; padding: 10px 13px; }
    .input-area { padding: 10px 12px; padding-bottom: max(16px, env(safe-area-inset-bottom)); }
    textarea { font-size: 16px; padding: 10px 13px; }
    button { width: 42px; height: 42px; }
    .hint { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="avatar">🌱</div>
  <div class="header-info">
    <h1>Diego Bravo</h1>
    <p>Productividad · Desarrollo personal</p>
  </div>
  <div class="status-dot"></div>
</div>

<div class="messages" id="messages"></div>

<div class="input-area">
  <div class="input-row">
    <textarea
      id="input"
      placeholder="Cuéntame qué hábito quieres trabajar..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button id="sendBtn" onclick="sendMessage()" title="Enviar">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0f0e0c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div class="hint">Enter para enviar · Shift+Enter para nueva línea</div>
</div>

<script>
  let conversationHistory = [];
  let isLoading = false;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function addMessage(role, text) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const avatarEmoji = role === 'bot' ? '🌱' : '👤';
    div.innerHTML = `
      <div class="msg-avatar">${avatarEmoji}</div>
      <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function showTyping() {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message bot';
    div.id = 'typing-indicator';
    div.innerHTML = `
      <div class="msg-avatar">🌱</div>
      <div class="bubble">
        <div class="typing"><span></span><span></span><span></span></div>
      </div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('input');
    const btn = document.getElementById('sendBtn');
    const text = input.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    btn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    addMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });
    showTyping();

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory })
      });

      const data = await response.json();
      removeTyping();

      const reply = data.reply || 'Lo siento, hubo un problema. ¿Puedes intentarlo de nuevo?';
      conversationHistory.push({ role: 'assistant', content: reply });
      addMessage('bot', reply);

    } catch (err) {
      removeTyping();
      addMessage('bot', 'Hubo un error de conexión. Por favor intenta de nuevo.');
    }

    isLoading = false;
    btn.disabled = false;
    input.focus();
  }

  // Fix teclado iPhone: scroll al input cuando aparece el teclado
  const input = document.getElementById('input');
  if (input) {
    input.addEventListener('focus', () => {
      setTimeout(() => {
        input.scrollIntoView({ behavior: 'smooth', block: 'end' });
        window.scrollTo(0, document.body.scrollHeight);
      }, 350);
    });
  }

  // Detectar altura visual para manejar teclado en Safari
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', () => {
      document.body.style.height = window.visualViewport.height + 'px';
    });
  }

  window.addEventListener('load', () => {
    setTimeout(() => {
      const welcome = `¡Hola! 👋 Mi nombre es Diego Bravo, soy tu Coach de Hábitos.\n\nEstoy aquí para ayudarte a construir rutinas que realmente funcionen, vencer la procrastinación y alcanzar tus metas con sistemas simples y efectivos.\n\n¿Con qué te gustaría empezar hoy? ¿Hay algún hábito que llevas tiempo queriendo construir o algo que sientes que te está frenando?\n\nDBS`;
      addMessage('bot', welcome);
      conversationHistory.push({ role: 'assistant', content: welcome });
    }, 300);
  });
</script>
</body>
</html>
